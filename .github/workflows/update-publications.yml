name: Update Publications

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update publications JSON from ORCID
        env:
          ORCID_ID: ${{ vars.ORCID_ID || secrets.ORCID_ID }}
          ORCID_MAX_PUBLICATIONS: ${{ vars.ORCID_MAX_PUBLICATIONS }}
          ORCID_TIMEOUT_SECONDS: ${{ vars.ORCID_TIMEOUT_SECONDS }}
        run: python -u scripts/update_publications.py

      - name: Commit and push if data changed
        run: |
          if git diff --quiet -- data/publications.json; then
            echo "No publication changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/publications.json
          git commit -m "chore: refresh publications data"
          git push
